<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 38" fill="none">
  <!-- House icon -->
  <g>
    <!-- Roof -->
    <path d="M6 18 L18 6 L30 18" stroke="#F89B24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Walls -->
    <path d="M9 16 L9 28 L27 28 L27 16" stroke="#F89B24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="14" y="20" width="8" height="8" rx="1" fill="#F89B24"/>
    <!-- Sun rays above roof peak -->
    <line x1="18" y1="2" x2="18" y2="4.5" stroke="#F89B24" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="22.5" y1="3.2" x2="21.2" y2="5.2" stroke="#F89B24" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="13.5" y1="3.2" x2="14.8" y2="5.2" stroke="#F89B24" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- WINDMAR wordmark -->
  <text
    x="38"
    y="20"
    font-family="Montserrat, Arial, sans-serif"
    font-weight="700"
    font-size="15"
    letter-spacing="0.8"
    fill="#F89B24"
  >WINDMAR</text>

  <!-- HOME subtext -->
  <text
    x="39"
    y="31"
    font-family="Montserrat, Arial, sans-serif"
    font-weight="500"
    font-size="8"
    letter-spacing="3.5"
    fill="rgba(255,255,255,0.45)"
  >HOME</text>
</svg>
